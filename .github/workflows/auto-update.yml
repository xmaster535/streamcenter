name: Auto Update

on:
  # Run every 5 minutes
  schedule:
    - cron: '*/5 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        env:
          PYTHONUNBUFFERED: 1
        run: |
          python -c "
          import asyncio
          from streamcenter import scrape, export_to_file
          asyncio.run(scrape())
          export_to_file('streams.json')
          print('Update completed!')
          "

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')"
          git push
